name: Daily AI4DB Discovery

on:
  schedule:
    - cron: "10 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ai4db-daily-discovery
  cancel-in-progress: true

jobs:
  discover:
    runs-on: ubuntu-latest
    env:
      OPENALEX_MAILTO: github-actions[bot]@users.noreply.github.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Discover new teams and papers
        run: |
          python scripts/discover_research_teams.py --apply --lookback-days 21

      - name: Rebuild dashboard
        run: |
          cd scripts
          python build_dashboard.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/researchers.json data/researchers.csv dashboard.html index.html
          git commit -m "chore: daily AI4DB discovery"
          git push
